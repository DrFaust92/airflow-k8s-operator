apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pools.airflow.drfaust92
spec:
  group: airflow.drfaust92
  scope: Namespaced
  names:
    kind: Pool
    plural: pools
    singular: pool
    shortNames:
      - pls
      - pl
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Message
          type: string
          jsonPath: .status.message
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - slots
              properties:
                slots:
                  type: integer
                  description: The maximum number of slots that can be assigned to tasks. One job may occupy one or more slots.
                includeDeferred:
                  type: boolean
                  description: Whether to include deferred tasks in the pool.  
                description:
                  type: string
                  description: The pool description.
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                phase:
                  type: string
                  description: Last reconciliation outcome (Synced or Error).
                message:
                  type: string
                  description: Human-readable detail about the last reconciliation.
