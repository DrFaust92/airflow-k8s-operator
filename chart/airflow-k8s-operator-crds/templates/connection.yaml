apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: connections.airflow.drfaust92
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: airflow.drfaust92
  scope: Namespaced
  names:
    kind: Connection
    plural: connections
    singular: connection
    shortNames:
      - conns
      - conn
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Message
          type: string
          jsonPath: .status.message
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                connType:
                  type: string
                  description: The connection type.
                description:
                  type: string
                  description: The connection description.
                host:
                  type: string
                  description: The connection host.
                # login/password may be provided as a direct value or a secretRef object
                login:
                  type: object
                  properties:
                    value:
                      type: string
                    secretRef:
                      type: object
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                  description: The connection login (value or secretRef).
                password:
                  type: object
                  properties:
                    value:
                      type: string
                    secretRef:
                      type: object
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                  description: The connection password (value or secretRef).
                port:
                  type: integer
                  format: int32
                  description: The connection port.
                schema:
                  type: string
                  description: The connection schema.
                extra:
                  type: string
                  description: The connection extra field.
                teamName:
                  type: string
                  description: Team name (Airflow 3 multi-team deployments only; ignored on Airflow 2).
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                phase:
                  type: string
                  description: Last reconciliation outcome (Synced or Error).
                message:
                  type: string
                  description: Human-readable detail about the last reconciliation.
