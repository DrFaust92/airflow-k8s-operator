chart-dirs:
  - chart
# The CRDs are cluster-scoped with helm.sh/resource-policy: keep, so installing
# the CRD chart standalone would collide with the operator chart's subchart CRDs
# on the shared ct kind cluster. It's exercised via the operator chart's
# dependency (and lint/render explicitly in helm-ci) instead.
excluded-charts:
  - airflow-k8s-operator-crds
helm-lint-extra-args: --set operator.airflowHost=airflow.example.com --set image.tag=ci-test --set image.repository=airflow-k8s-operator
helm-extra-set-args: --set operator.airflowHost=airflow.example.com --set image.tag=ci-test --set image.repository=airflow-k8s-operator --set operator.basicAuthSecret.enabled=true --set operator.basicAuthSecret.create=true
