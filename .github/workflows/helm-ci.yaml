name: Lint Charts

on:
  pull_request:
    paths:
      - 'chart/**'

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.1

      - uses: actions/setup-python@v7.0.0
        with:
          python-version: '3.x'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Lint CRD chart
        # Excluded from ct (see config.yaml), so lint it explicitly.
        run: helm lint chart/airflow-k8s-operator-crds

      - name: Build operator chart dependencies
        run: helm dependency build chart/airflow-k8s-operator

      - name: Render both scopes
        run: |
          set -euo pipefail
          CHART=chart/airflow-k8s-operator
          echo "== scope=cluster =="
          helm template t "$CHART" --set operator.airflowHost=airflow.example.com --set scope=cluster > /dev/null
          echo "== scope=namespaced =="
          helm template t "$CHART" --set operator.airflowHost=airflow.example.com --set scope=namespaced > /dev/null
          echo "== scope=namespaced, crds.create=false (tenant release) =="
          helm template t "$CHART" --set operator.airflowHost=airflow.example.com --set scope=namespaced --set crds.create=false > /dev/null
          echo "== standalone CRD chart =="
          helm template t chart/airflow-k8s-operator-crds > /dev/null

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config config.yaml --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config config.yaml --target-branch ${{ github.event.repository.default_branch }}

      - name: Build Docker image
        if: steps.list-changed.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          context: .
          tags: "airflow-k8s-operator:ci-test"
          load: true

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: kind-chart-testing
      - name: Load Docker image into kind
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          kind load docker-image airflow-k8s-operator:ci-test --name kind-chart-testing

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config config.yaml --target-branch ${{ github.event.repository.default_branch }}
