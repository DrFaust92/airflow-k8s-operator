name: Release Charts

on:
  push:
    branches:
      - master
    paths:
      - 'chart/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to push chart release and create a release (helm/chart-releaser-action)
      packages: write # needed for ghcr access
      id-token: write # needed for keyless signing

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_SKIP_EXISTING: true
          CR_GENERATE_RELEASE_NOTES: true

      # see https://github.com/helm/chart-releaser/issues/183
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push charts to GHCR
        run: |
          set -euo pipefail
          OWNER=${GITHUB_REPOSITORY_OWNER,,}
          # CRD chart first (standalone, reusable). chart-releaser skips existing
          # versions, and helm push is idempotent for an already-published tag.
          helm package chart/airflow-k8s-operator-crds
          helm push airflow-k8s-operator-crds-*.tgz oci://ghcr.io/${OWNER}/charts
          # Operator chart: vendor the CRD subchart, then package + push.
          helm dependency build chart/airflow-k8s-operator
          helm package chart/airflow-k8s-operator
          # [0-9] so this glob does not also match the -crds- archive.
          helm push airflow-k8s-operator-[0-9]*.tgz oci://ghcr.io/${OWNER}/charts

