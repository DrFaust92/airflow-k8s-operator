name: generate-check

on:
  pull_request:
  push:
    branches: [master]

jobs:
  crds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6 # uses .python-version file by default

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Install dependencies
        run: uv sync --group dev

      - name: Regenerate CRDs from the spec models
        run: uv run python scripts/gen_crds.py

      - name: Fail if the committed CRDs are stale
        run: |
          git diff --exit-code -- chart/airflow-k8s-operator-crds/templates \
            || (echo "::error::CRDs are out of date. Run 'make generate' and commit." && exit 1)
